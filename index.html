  :root{
    --paper:#F7F6F1;

<script>
/* ============ STORAGE HELPERS ============ */
async function sGet(key, shared){
  try{
    const r = await window.storage.get(key, shared);
    return r ? JSON.parse(r.value) : null;
  }catch(e){ return null; }
}
async function sSet(key, value, shared){
  try{
    await window.storage.set(key, JSON.stringify(value), shared);
    return true;
  }catch(e){ console.error('storage set failed', e); return false; }
}

/* ============ STATE ============ */
const state = {
  assistencias: [],
  passagens: [],
  viagens: [],
  tecnicos: [],
  role: 'Administrador',
  tab: 'dashboard',
  filters: { agenda:{tecnico:'',cidade:'',supervisor:'',tipo:''} },
  agendaMonth: new Date(),
  agendaSelectedDay: null,
  search: '',
  modal: null // {type:'assistencia'|'tecnico', id: null|string}
};

const uid = () => Math.random().toString(36).slice(2,10) + Date.now().toString(36).slice(-4);
const todayStr = () => new Date().toISOString().slice(0,10);
const fmtDate = (d) => { if(!d) return '—'; const [y,m,day]=d.split('-'); return day+'/'+m+'/'+y; };
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

const ASSIST_STATUS = ['Agendada','Em andamento','Aguardando Peça','Retorno Necessário','Concluída','Cancelada'];
const PRIORIDADES = ['Baixa','Média','Alta','Urgente'];
const SOLICITACAO_STATUS = ['Pendente','Aprovada','Em andamento','Finalizada'];

function statusClass(s){
  const map = {'Agendada':'agendada','Em andamento':'andamento','Concluída':'concluida','Adiada':'adiada','Cancelada':'cancelada','Aguardando Peça':'aguardando','Retorno Necessário':'retorno','Pendente':'pendente','Aprovada':'aprovada','Finalizada':'finalizada'};
  return map[s] || 'agendada';
}
function stampColorClass(s){ return 'stamp-'+statusClass(s); }
function ticketBorderClass(s){
  if(s==='Concluída' || s==='Finalizada') return 'status-concluida';
  if(s==='Cancelada') return 'status-cancelada';
  if(s==='Em andamento') return 'status-andamento';
  return '';
}
function prioridadeClass(p){ return 'badge-'+ (p ? p.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'') : 'baixa'); }

/* ============ INIT ============ */
async function init(){
  const [a,p,v,t,r] = await Promise.all([
    sGet('assistencias', true),
    sGet('passagens', true),
    sGet('viagens', true),
    sGet('tecnicos', true),
    sGet('user-role', false)
  ]);
  state.assistencias = a || [];
  state.passagens = p || [];
  state.viagens = v || [];
  state.tecnicos = t || [];
  state.role = (r && r.role) || 'Administrador';
  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='flex';
  render();
}

async function persist(key){
  if(key==='assistencias') await sSet('assistencias', state.assistencias, true);
  if(key==='passagens') await sSet('passagens', state.passagens, true);
  if(key==='viagens') await sSet('viagens', state.viagens, true);
  if(key==='tecnicos') await sSet('tecnicos', state.tecnicos, true);
}
async function persistRole(){ await sSet('user-role', {role: state.role}, false); }

/* ============ RENDER ROOT ============ */
function render(){
  const app = document.getElementById('app');
  app.innerHTML = `
    ${renderSidebar()}
    <div class="main">
      ${renderTopbar()}
      <div class="content">
        ${state.search.trim() ? renderSearchResults() : renderTabContent()}
      </div>
    </div>
    ${state.modal ? renderModal() : ''}
  `;
  bindEvents();
}

function countToday(){
  const t = todayStr();
  return state.assistencias.filter(x=>x.data===t && !['Concluída','Cancelada'].includes(x.status)).length;
}

    <div class="today mono">${new Date().toLocaleDateString('pt-BR', {weekday:'short', day:'2-digit', month:'short'})}</div>
  </div>`;
}

function renderTabContent(){
  if(state.tab==='dashboard') return renderDashboard();
  if(state.tab==='assistencias') return renderAssistencias();
  if(state.tab==='agenda') return renderAgenda();
  if(state.tab==='passagens') return renderPassagens();
  if(state.tab==='viagens') return renderViagens();

  return '';

/* ============ SEARCH ============ */
function matchesQuery(item, q){
  q = q.toLowerCase();
  const fields = [item.cliente, item.contrato, item.tecnico, item.colaborador, item.origem, item.destino, item.origemCidade, item.destinoCidade];
  return fields.some(v => (v||'').toString().toLowerCase().includes(q));
}
function renderSearchResults(){
  const q = state.search;
  const rows = [
    ...state.assistencias.filter(x=>matchesQuery(x,q)).map(x=>({...x, _tipo:'assistencia', _label:'Assistência', _data:x.data, _pessoa:x.cliente})),
    ...state.passagens.filter(x=>matchesQuery(x,q)).map(x=>({...x, _tipo:'passagem', _label:'Passagem', _data:x.data, _pessoa:x.colaborador})),
    ...state.viagens.filter(x=>matchesQuery(x,q)).map(x=>({...x, _tipo:'viagem', _label:'Viagem', _data:x.dataInicio, _pessoa:x.colaborador}))
  ].sort((x,y)=> (y._data||'').localeCompare(x._data||''));

  if(rows.length===0){
    return `<div class="search-results"><div class="search-results-head">Nenhum resultado para “${escapeHtml(q)}”</div></div>`;
  }
  return `
  <div class="notice">Resultado da busca — histórico completo por colaborador, cliente, contrato ou período.</div>
  <div class="search-results">
    <div class="search-results-head">${rows.length} resultado(s) para “${escapeHtml(q)}”</div>
    ${rows.map(r=>`
      <div class="search-row" data-open="${r._tipo}" data-id="${r.id}">
        <span class="badge" style="background:var(--grey-bg);color:var(--ink-soft);">${r._label}</span>
        <div>
          <div style="font-weight:600;">${escapeHtml(r._pessoa||'—')} ${r.contrato?`<span class="mono" style="color:var(--ink-soft);font-weight:400;">#${escapeHtml(r.contrato)}</span>`:''}</div>
          <div style="font-size:12.5px;color:var(--ink-soft);">${fmtDate(r._data)} · ${escapeHtml(r.status)}</div>
        </div>
      </div>
    `).join('')}
  </div>`;
}

/* ============ DASHBOARD ============ */
function renderDashboard(){
  const t = todayStr();
  const items = state.assistencias;

  const assistHoje = items.filter(x=>x.data===t && x.status!=='Cancelada').length;
  const emAndamento = items.filter(x=>x.status==='Em andamento').length;
  const concluidosHoje = items.filter(x=>x.status==='Concluída' && x.data===t).length;
  const aguardandoPeca = items.filter(x=>x.status==='Aguardando Peça').length;

  const hojeItems = items.filter(x=>x.data===t).sort((a,b)=>(a.horario||'').localeCompare(b.horario||''));

  return `
  <div class="section-head"><h1>Painel de Controle</h1></div>
  <div class="grid grid-4" style="margin-bottom:18px;">
    <div class="stat-card accent-blue"><div class="num">${assistHoje}</div><div class="lbl">Assistências agendadas hoje</div></div>
    <div class="stat-card accent-amber"><div class="num">${emAndamento}</div><div class="lbl">Serviços em andamento</div></div>
    <div class="stat-card accent-green"><div class="num">${concluidosHoje}</div><div class="lbl">Concluídos hoje</div></div>
    <div class="stat-card accent-red"><div class="num">${aguardandoPeca}</div><div class="lbl">Aguardando peça</div></div>
  </div>
  <div class="panel">
    <h2>Agenda do dia <small>${hojeItems.length} atendimento(s)</small></h2>
    ${hojeItems.length===0 ? '<div style="color:var(--ink-soft);font-size:13.5px;">Nenhum atendimento marcado para hoje.</div>' :
      hojeItems.map(x=>`
        <div class="day-list-item" data-open="assistencia" data-id="${x.id}" style="cursor:pointer;">
          <div class="day-time">${x.horario||'--:--'}</div>
          <div>
            <b>${escapeHtml(x.cliente)}</b>
            <div style="font-size:12.5px;color:var(--ink-soft);">${escapeHtml(x.tecnico||'sem técnico')} · ${escapeHtml(x.status)}</div>
          </div>
        </div>
      `).join('')}
  </div>`;
}

/* ============ ASSISTÊNCIAS ============ */
function applyAssistFilters(list){
  const f = state.filters.assistencias || {};
  return list.filter(x=>
    (!f.status || x.status===f.status) &&
    (!f.prioridade || x.prioridade===f.prioridade) &&
    (!f.tecnico || x.tecnico===f.tecnico)
  );
}
function renderAssistencias(){
  const tecnicos = [...new Set(state.assistencias.map(x=>x.tecnico).filter(Boolean))];
  const list = applyAssistFilters(state.assistencias).sort((a,b)=>(b.data||'').localeCompare(a.data||''));
  const f = state.filters.assistencias || {};
  return `
  <div class="section-head">
    <h1>Assistência Técnica</h1>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-ghost btn-sm" data-export="assistencias">Exportar CSV</button>
      <button class="btn btn-primary" data-new="assistencia">+ Nova assistência</button>
    </div>
  </div>
  <div class="filters-bar">
    <select data-filter="assistencias:status"><option value="">Status: todos</option>${ASSIST_STATUS.map(s=>`<option ${f.status===s?'selected':''}>${s}</option>`).join('')}</select>
    <select data-filter="assistencias:prioridade"><option value="">Prioridade: todas</option>${PRIORIDADES.map(s=>`<option ${f.prioridade===s?'selected':''}>${s}</option>`).join('')}</select>
    <select data-filter="assistencias:tecnico"><option value="">Técnico: todos</option>${tecnicos.map(t=>`<option ${f.tecnico===t?'selected':''}>${escapeHtml(t)}</option>`).join('')}</select>
  </div>
  <div class="tickets">
    ${list.length===0 ? emptyState('Nenhuma assistência técnica cadastrada ainda.') : list.map(a=>renderAssistTicket(a)).join('')}
  </div>`;
}
function renderAssistTicket(a){
  return `
  <div class="ticket ${ticketBorderClass(a.status)}">

      <div>
        <div class="ticket-id">CONTRATO #${escapeHtml(a.contrato||'—')} &nbsp;·&nbsp; <span class="badge ${prioridadeClass(a.prioridade)}">${a.prioridade||'Baixa'}</span></div>
        <div class="ticket-client">${escapeHtml(a.cliente)}</div>
      </div>
      <div class="stamp ${stampColorClass(a.status)}">${a.status}</div>
    </div>
    <div class="ticket-meta">
      <span>🔧 ${escapeHtml(a.servico||'—')}</span>
      <span>📍 ${escapeHtml(a.endereco||'—')}${a.cidade?', '+escapeHtml(a.cidade):''}</span>
      <span>📞 ${escapeHtml(a.telefone||'—')}</span>
      <span>📅 <b>${fmtDate(a.data)}</b> ${a.horario||''}</span>
      <span>👷 ${escapeHtml(a.tecnico||'não atribuído')}</span>
      <span>🧭 Supervisor: ${escapeHtml(a.supervisor||'—')}</span>
    </div>
    ${a.observacoes ? `<div class="ticket-obs">"${escapeHtml(a.observacoes)}"</div>` : ''}

    `).join('') : ''}
    <div class="ticket-actions">
      <button class="btn btn-ghost btn-sm" data-edit="assistencia" data-id="${a.id}">Editar</button>

/* ============ VIAGENS (VExpenses) ============ */
function calcDias(inicio, fim){
  if(!inicio || !fim) return 0;
  const d1 = new Date(inicio+'T00:00:00'), d2 = new Date(fim+'T00:00:00');
  const diff = Math.round((d2-d1)/86400000);
  return diff > 0 ? diff : 0;
}
function applyViagemFilters(list){
  const f = state.filters.viagens || {};
  return list.filter(x=>
    (!f.status || x.status===f.status) &&
    (!f.colaborador || x.colaborador===f.colaborador)
  );
}
function renderViagens(){
  const colaboradores = [...new Set(state.viagens.map(x=>x.colaborador).filter(Boolean))];
  const list = applyViagemFilters(state.viagens).sort((a,b)=>(b.dataInicio||'').localeCompare(a.dataInicio||''));
  const f = state.filters.viagens || {};
  return `
  <div class="section-head">
    <h1>Solicitação de Viagens <small style="font-family:'Inter',sans-serif;text-transform:none;letter-spacing:0;font-weight:400;font-size:13px;color:var(--ink-soft);">VExpenses</small></h1>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-ghost btn-sm" data-export="viagens">Exportar CSV</button>
      <button class="btn btn-primary" data-new="viagem">+ Nova solicitação</button>
    </div>
  </div>
  <div class="filters-bar">
    <select data-filter="viagens:status"><option value="">Status: todos</option>${SOLICITACAO_STATUS.map(s=>`<option ${f.status===s?'selected':''}>${s}</option>`).join('')}</select>
    <select data-filter="viagens:colaborador"><option value="">Colaborador: todos</option>${colaboradores.map(c=>`<option ${f.colaborador===c?'selected':''}>${escapeHtml(c)}</option>`).join('')}</select>
  </div>
  <div class="tickets">
    ${list.length===0 ? emptyState('Nenhuma solicitação de viagem cadastrada ainda.') : list.map(v=>renderViagemTicket(v)).join('')}
  </div>`;
}
function renderViagemTicket(v){
  const dias = v.dias || calcDias(v.dataInicio, v.dataFim);
  return `
  <div class="ticket ${ticketBorderClass(v.status)}">
    <div class="ticket-top">
      <div>
        <div class="ticket-id">VIAGEM · ${escapeHtml(v.cliente||'cliente não informado')}</div>
        <div class="ticket-client">${escapeHtml(v.colaborador)}</div>
      </div>
      <div class="stamp ${stampColorClass(v.status)}">${v.status}</div>
    </div>
    <div class="ticket-meta">
      <span>🛫 ${escapeHtml(v.origemCidade||'—')} → ${escapeHtml(v.destinoCidade||'—')}</span>
      <span>📅 <b>${fmtDate(v.dataInicio)}</b> a <b>${fmtDate(v.dataFim)}</b> (${dias} dia${dias===1?'':'s'})</span>
      <span>💰 Diária: ${v.valorDiaria ? 'R$ '+parseFloat(v.valorDiaria).toFixed(2) : '—'}</span>
      <span>🏨 Hospedagem: ${escapeHtml(v.hospedagem||'Não')}${v.hospedagem==='Sim' && v.qtdDiariasHotel ? ' · '+escapeHtml(v.qtdDiariasHotel)+' diária(s) de hotel' : ''}</span>
    </div>
    ${v.observacoes ? `<div class="ticket-obs">"${escapeHtml(v.observacoes)}"</div>` : ''}
    <div class="ticket-actions">
      <button class="btn btn-ghost btn-sm" data-edit="viagem" data-id="${v.id}">Editar</button>
      ${state.role!=='Técnico' ? `<button class="btn btn-danger btn-sm" data-delete="viagem" data-id="${v.id}">Excluir</button>` : ''}
    </div>
  </div>`;
}

/* ============ AGENDA ============ */
function combinedItems(){
  return state.assistencias;
}
function applyAgendaFilters(items){
  const f = state.filters.agenda;
  return items.filter(x=>
    (!f.tecnico || x.tecnico===f.tecnico) &&
    (!f.cidade || x.cidade===f.cidade) &&
    (!f.supervisor || x.supervisor===f.supervisor)
  );
}
function renderAgenda(){
  const items = applyAgendaFilters(combinedItems());
  const cidades = [...new Set(combinedItems().map(x=>x.cidade).filter(Boolean))];
  const tecnicos = [...new Set(combinedItems().map(x=>x.tecnico).filter(Boolean))];
  const supervisores = [...new Set(combinedItems().map(x=>x.supervisor).filter(Boolean))];
  const f = state.filters.agenda;

  const cur = state.agendaMonth;
  const year = cur.getFullYear(), month = cur.getMonth();
  const first = new Date(year, month, 1);
  const startDow = first.getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const monthLabel = cur.toLocaleDateString('pt-BR', {month:'long', year:'numeric'});
  const t = todayStr();

  let cells = '';
  for(let i=0;i<startDow;i++) cells += `<div class="cal-cell empty"></div>`;
  for(let d=1; d<=daysInMonth; d++){
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayItems = items.filter(x=>x.data===dateStr);
    const dots = dayItems.slice(0,4).map(()=>`<span class="cal-dot" style="background:var(--blueprint)"></span>`).join('');
    cells += `<div class="cal-cell ${dateStr===t?'today':''} ${state.agendaSelectedDay===dateStr?'selected':''}" data-day="${dateStr}">
      <div class="cal-daynum">${d}</div>
      <div class="cal-dots">${dots}${dayItems.length>4?`<span style="font-size:10px;color:var(--ink-soft);">+${dayItems.length-4}</span>`:''}</div>
    </div>`;
  }

  const selected = state.agendaSelectedDay;
  const dayItems = selected ? items.filter(x=>x.data===selected).sort((a,b)=>(a.horario||'').localeCompare(b.horario||'')) : [];

  return `
  <div class="section-head"><h1>Agenda</h1></div>
  <div class="filters-bar">
    <select data-filter="agenda:tecnico"><option value="">Técnico: todos</option>${tecnicos.map(x=>`<option ${f.tecnico===x?'selected':''}>${escapeHtml(x)}</option>`).join('')}</select>
    <select data-filter="agenda:cidade"><option value="">Cidade: todas</option>${cidades.map(x=>`<option ${f.cidade===x?'selected':''}>${escapeHtml(x)}</option>`).join('')}</select>
    <select data-filter="agenda:supervisor"><option value="">Supervisor: todos</option>${supervisores.map(x=>`<option ${f.supervisor===x?'selected':''}>${escapeHtml(x)}</option>`).join('')}</select>
  </div>
  <div class="grid" style="grid-template-columns:1.6fr 1fr;">
    <div class="panel">
      <div class="cal-header">
        <button class="btn btn-ghost btn-sm" data-cal-nav="-1">‹</button>
        <h2 style="margin:0;text-transform:capitalize;">${monthLabel}</h2>
        <button class="btn btn-ghost btn-sm" data-cal-nav="1">›</button>
        <button class="btn btn-ghost btn-sm" data-cal-nav="0" style="margin-left:auto;">Hoje</button>
      </div>
      <div class="cal-grid">
        ${['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'].map(d=>`<div class="cal-dow">${d}</div>`).join('')}
        ${cells}
      </div>
    </div>
    <div class="panel">
      <h2>${selected ? fmtDate(selected) : 'Selecione um dia'}<small>${selected? dayItems.length+' atendimento(s)':''}</small></h2>
      ${!selected ? '<div style="color:var(--ink-soft);font-size:13px;">Clique em um dia no calendário para ver os atendimentos.</div>' :
        dayItems.length===0 ? '<div style="color:var(--ink-soft);font-size:13px;">Nenhum atendimento nesta data.</div>' :
        dayItems.map(x=>`
          <div class="day-list-item" data-open="assistencia" data-id="${x.id}" style="cursor:pointer;">
            <div class="day-time">${x.horario||'--:--'}</div>
            <div>
              <b>${escapeHtml(x.cliente)}</b>
              <div style="font-size:12px;color:var(--ink-soft);">${escapeHtml(x.tecnico||'sem técnico')} · ${escapeHtml(x.status)}</div>
            </div>
          </div>
        `).join('')
      }
    </div>
  </div>`;
}

function getById(type, id){
  const arr = type==='assistencia' ? state.assistencias : type==='passagem' ? state.passagens : type==='viagem' ? state.viagens : state.tecnicos;
  return arr.find(x=>x.id===id);

function renderModal(){
  const {type, id} = state.modal;
  const isEdit = !!id;

/* ============ EVENTS ============ */
let tempAnexos = { ambientes:[] };

function bindEvents(){
  document.querySelectorAll('[data-nav]').forEach(el=>el.onclick=()=>{ state.tab=el.dataset.nav; state.search=''; render(); });
  const roleSel = document.getElementById('roleSelect');
  if(roleSel) roleSel.onchange = async ()=>{ state.role = roleSel.value; await persistRole(); render(); toast('Nível de acesso alterado para '+state.role); };

  const searchInput = document.getElementById('searchInput');
  if(searchInput){
    searchInput.oninput = ()=>{ state.search = searchInput.value; render(); document.getElementById('searchInput').focus(); document.getElementById('searchInput').setSelectionRange(state.search.length,state.search.length); };
  }

  document.querySelectorAll('[data-open]').forEach(el=>el.onclick=()=>{ state.modal={type:el.dataset.open, id:el.dataset.id}; resetTempAnexos(el.dataset.open, el.dataset.id); render(); });
  document.querySelectorAll('[data-new]').forEach(el=>el.onclick=()=>{ state.modal={type:el.dataset.new, id:null}; resetTempAnexos(el.dataset.new, null); render(); });
  document.querySelectorAll('[data-edit]').forEach(el=>el.onclick=()=>{ state.modal={type:el.dataset.edit, id:el.dataset.id}; resetTempAnexos(el.dataset.edit, el.dataset.id); render(); });
  document.querySelectorAll('[data-delete]').forEach(el=>el.onclick=async ()=>{
    if(!confirm('Confirma excluir este registro?')) return;
    await deleteItem(el.dataset.delete, el.dataset.id);
  });

  document.querySelectorAll('[data-filter]').forEach(el=>el.onchange=()=>{
    const [group,key] = el.dataset.filter.split(':');
    state.filters[group] = state.filters[group] || {};
    state.filters[group][key] = el.value;
    render();
  });

  document.querySelectorAll('[data-cal-nav]').forEach(el=>el.onclick=()=>{
    const dir = parseInt(el.dataset.calNav,10);
    if(dir===0){ state.agendaMonth = new Date(); }
    else state.agendaMonth = new Date(state.agendaMonth.getFullYear(), state.agendaMonth.getMonth()+dir, 1);
    render();
  });
  document.querySelectorAll('[data-day]').forEach(el=>el.onclick=()=>{ state.agendaSelectedDay = el.dataset.day; render(); });

  document.querySelectorAll('[data-export]').forEach(el=>el.onclick=()=>exportCSV(el.dataset.export));

  const overlay = document.getElementById('modalOverlay');
  if(overlay){
    overlay.onclick = (e)=>{ if(e.target===overlay) closeModal(); };
    document.getElementById('cancelModal').onclick = closeModal;
    document.getElementById('saveModal').onclick = (e)=>{ e.preventDefault(); submitModal(); };
    bindAnexoButtons();
    const di = document.getElementById('viagemDataInicio'), df = document.getElementById('viagemDataFim');
    if(di && df){
      const updateDias = ()=>{ const dc = document.getElementById('viagemDiasCalc'); if(dc) dc.textContent = calcDias(di.value, df.value) + ' dia(s) — calculado automaticamente'; };
      di.oninput = updateDias; df.oninput = updateDias;
    }
  }
}

function resetTempAnexos(type, id){
  if(type==='assistencia'){ const it = id?getById('assistencia',id):null; tempAnexos.ambientes = it && it.ambientes ? JSON.parse(JSON.stringify(it.ambientes)) : []; }
}
function bindAnexoButtons(){
  bindAmbienteEvents();
}
function refreshAmbientesContainer(){
  const c = document.getElementById('ambientesContainer');
  if(c){ c.innerHTML = renderAmbientesBuilder(); }
  bindAmbienteEvents();
}
function bindAmbienteEvents(){
  const addBtn = document.getElementById('addAmbiente');
  if(addBtn) addBtn.onclick = ()=>{ tempAnexos.ambientes.push({nome:'',observacao:'',fotos:[]}); refreshAmbientesContainer(); };
  document.querySelectorAll('[data-amb-remove]').forEach(el=>el.onclick=()=>{ tempAnexos.ambientes.splice(parseInt(el.dataset.ambRemove),1); refreshAmbientesContainer(); });
  document.querySelectorAll('[data-amb-nome]').forEach(el=>el.oninput=()=>{ tempAnexos.ambientes[parseInt(el.dataset.ambNome)].nome = el.value; });
  document.querySelectorAll('[data-amb-obs]').forEach(el=>el.oninput=()=>{ tempAnexos.ambientes[parseInt(el.dataset.ambObs)].observacao = el.value; });
  document.querySelectorAll('[data-amb-foto-add]').forEach(el=>el.onclick=()=>{
    const idx = parseInt(el.dataset.ambFotoAdd);
    const inp = document.querySelector(`[data-amb-foto-input="${idx}"]`);
    if(inp && inp.value.trim()){
      tempAnexos.ambientes[idx].fotos = tempAnexos.ambientes[idx].fotos || [];
      tempAnexos.ambientes[idx].fotos.push(inp.value.trim());
      refreshAmbientesContainer();
    }
  });
  document.querySelectorAll('[data-amb-foto-rm]').forEach(el=>el.onclick=()=>{
    const [idx,fi] = el.dataset.ambFotoRm.split(':').map(Number);
    tempAnexos.ambientes[idx].fotos.splice(fi,1);
    refreshAmbientesContainer();
  });
}
function closeModal(){ state.modal = null; render(); }

async function submitModal(){
  const {type, id} = state.modal;
  const form = document.getElementById('itemForm');
  const fd = new FormData(form);
  const data = Object.fromEntries(fd.entries());
  if(type==='tecnico' && !data.nome){ toast('Informe o nome.'); return; }
  if(type==='assistencia' && !data.cliente){ toast('Informe o nome do cliente.'); return; }
  if((type==='passagem' || type==='viagem') && !data.colaborador){ toast('Informe o colaborador.'); return; }

  if(type==='assistencia'){
    data.ambientes = tempAnexos.ambientes.filter(amb => (amb.nome && amb.nome.trim()) || (amb.fotos && amb.fotos.length) || (amb.observacao && amb.observacao.trim()));
    if(id){ const existing = getById('assistencia',id); delete existing.anexosAntes; delete existing.anexosDepois; Object.assign(existing, data); }
    else { data.id = uid(); state.assistencias.push(data); }
    await persist('assistencias');
  } else if(type==='passagem'){
    if(id){ Object.assign(getById('passagem',id), data); }
    else { data.id = uid(); state.passagens.push(data); }
    await persist('passagens');
  } else if(type==='viagem'){
    data.dias = calcDias(data.dataInicio, data.dataFim);
    if(id){ Object.assign(getById('viagem',id), data); }
    else { data.id = uid(); state.viagens.push(data); }
    await persist('viagens');
  } else if(type==='tecnico'){
    data.cidades = (data.cidades||'').split(',').map(s=>s.trim()).filter(Boolean);
    if(id){ Object.assign(getById('tecnico',id), data); }
    else { data.id = uid(); state.tecnicos.push(data); }
    await persist('tecnicos');
  }
  toast('Salvo com sucesso.');
  state.modal = null;
  render();
}

async function deleteItem(type, id){
  if(type==='assistencia'){ state.assistencias = state.assistencias.filter(x=>x.id!==id); await persist('assistencias'); }
  if(type==='passagem'){ state.passagens = state.passagens.filter(x=>x.id!==id); await persist('passagens'); }
  if(type==='viagem'){ state.viagens = state.viagens.filter(x=>x.id!==id); await persist('viagens'); }
  if(type==='tecnico'){ state.tecnicos = state.tecnicos.filter(x=>x.id!==id); await persist('tecnicos'); }
  toast('Registro excluído.');
  render();
}

function exportCSV(type){
  const lists = { assistencias: state.assistencias, passagens: state.passagens, viagens: state.viagens };
  const colsMap = {
    assistencias: ['cliente','contrato','endereco','cidade','telefone','servico','data','horario','tecnico','supervisor','prioridade','status','observacoes'],
    passagens: ['colaborador','origem','destino','data','status','observacoes'],
    viagens: ['colaborador','origemCidade','destinoCidade','cliente','dataInicio','dataFim','dias','valorDiaria','hospedagem','qtdDiariasHotel','status','observacoes']
  };
  const list = lists[type];
  const cols = colsMap[type];
  if(!list || list.length===0){ toast('Não há dados para exportar.'); return; }
  const rows = [cols.join(';'), ...list.map(item=>cols.map(c=>`"${(item[c]||'').toString().replace(/"/g,'""')}"`).join(';'))];
  const blob = new Blob(['\ufeff'+rows.join('\n')], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url; link.download = type+'.csv';
  document.body.appendChild(link); link.click(); document.body.removeChild(link);
  URL.revokeObjectURL(url);
  toast('CSV exportado (abre direto no Excel).');
}

function escapeHtml(s){ return (s||'').toString().replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function escapeAttr(s){ return escapeHtml(s).replace(/\n/g,' '); }

init();
</script>
